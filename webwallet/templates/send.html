<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Coins - Blockchain Web Wallet</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-text">Blockchain Wallet</span>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/explorer">Explorer</a>
                <a href="/wallet?address={{.From}}">Wallet</a>
                <a href="/send?from={{.From}}">Send</a>
            </div>
        </div>
    </nav>

    <div class="send-container">
        <div class="send-card">
            <h2>Send Coins</h2>
            <p class="send-subtitle">Transfer coins to another wallet address</p>

            {{with .Error}}
                <div class="error-message">{{.}}</div>
            {{end}}

            <form method="POST" action="/send" class="send-form">
                <input type="hidden" name="from" value="{{.From}}">
                
                <div class="form-group">
                    <label for="from">From Address</label>
                    <input type="text" id="from" name="from" value="{{.From}}" readonly class="input-field">
                </div>

                <br>
                <br>

                <div class="form-group">
                    <label for="to">To Address</label>
                    <input type="text" id="to" name="to" placeholder="Enter recipient's address" class="input-field" required>
                </div>

                <br>
                <br>

                <div class="form-group">
                    <label for="amount">Amount (coins)</label>
                    <input type="number" id="amount" name="amount" placeholder="Enter amount to send" class="input-field" min="1" required>
                </div>

                <br>
                <br>

                <button type="submit" class="btn btn-primary btn-block">Send Coins</button>
            </form>

            <div class="send-info">
                <p>Transaction fees are automatically included in each block.</p>
                <p>You'll earn 100 coins for every block you mine.</p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
